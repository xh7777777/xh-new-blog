name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
  ALIYUN_NAME_SPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
  ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
  ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
  FRONTEND_IMAGE_NAME: xhblognew
  IMAGE_VERSION: v0.1

jobs:
  build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate registry secrets
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          test -n "${{ env.ALIYUN_REGISTRY }}" || (echo "::error::Missing secret ALIYUN_REGISTRY" && exit 1)
          test -n "${{ env.ALIYUN_NAME_SPACE }}" || (echo "::error::Missing secret ALIYUN_NAME_SPACE" && exit 1)
          test -n "${{ env.ALIYUN_REGISTRY_USER }}" || (echo "::error::Missing secret ALIYUN_REGISTRY_USER" && exit 1)
          test -n "${{ env.ALIYUN_REGISTRY_PASSWORD }}" || (echo "::error::Missing secret ALIYUN_REGISTRY_PASSWORD" && exit 1)

      - name: Set up Docker Buildx
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.ALIYUN_REGISTRY != '' && env.ALIYUN_NAME_SPACE != '' && env.ALIYUN_REGISTRY_USER != '' && env.ALIYUN_REGISTRY_PASSWORD != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Registry
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.ALIYUN_REGISTRY != '' && env.ALIYUN_NAME_SPACE != '' && env.ALIYUN_REGISTRY_USER != '' && env.ALIYUN_REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ env.ALIYUN_REGISTRY_USER }}
          password: ${{ env.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and Push Background Docker Image
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.ALIYUN_REGISTRY != '' && env.ALIYUN_NAME_SPACE != '' && env.ALIYUN_REGISTRY_USER != '' && env.ALIYUN_REGISTRY_PASSWORD != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          cache-from: type=gha,scope=background
          cache-to: type=gha,mode=max,scope=background
          tags: |
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAME_SPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAME_SPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
